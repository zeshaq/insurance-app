name: pact
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Stage A — Consumer side
  # ---------------------------------------------------------------------------
  # For each BFF (customer-app + agent-app), install deps, run the
  # *.pact.test.ts file, and confirm the JSON pact regenerated by the test
  # is byte-identical to what's committed under pacts/ at the repo root.
  # A drift between code and the committed pact is what we want CI to catch
  # — that's the entire point of contract testing.
  # ---------------------------------------------------------------------------
  consumer:
    name: pact consumer (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - customer-app
          - agent-app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: gui/${{ matrix.app }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: Run pact consumer test
        # Each BFF has exactly one *.pact.test.ts file. We grep for it
        # rather than hard-coding the path so a future PR adding more
        # endpoints (more pact tests in the same dir) Just Works.
        working-directory: gui/${{ matrix.app }}
        run: |
          set -e
          tests=$(git ls-files '*.pact.test.ts' | grep -v '^/' || true)
          if [ -z "$tests" ]; then
            echo "::error::no *.pact.test.ts files found in gui/${{ matrix.app }}"
            exit 1
          fi
          echo "running: $tests"
          npx vitest run $tests

      - name: Fail if regenerated pact drifted from committed pact
        run: |
          # If a developer changed the consumer's expectation but forgot
          # to commit the regenerated pact under pacts/, this step catches
          # it. `git diff --exit-code` returns non-zero on any change.
          if ! git diff --exit-code -- pacts/; then
            echo "::error::pacts/ drifted — regenerated pact differs from the committed file."
            echo "::error::Run the *.pact.test.ts files locally, commit the updated pacts/*.json, and push."
            exit 1
          fi

      - name: Upload pact files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pacts-${{ matrix.app }}
          path: pacts/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Stage B — Provider side
  # ---------------------------------------------------------------------------
  # Replay the committed pact files against a running Liberty using the
  # Pact-JVM provider verifier (LibertyProviderPactTest). Two modes:
  #
  #   1. PACT_PROVIDER_URL is configured as a repo variable (e.g. a
  #      tailscaled tunnel into the staging VM): the verifier runs end
  #      to end against that Liberty and fails on contract mismatch.
  #
  #   2. PACT_PROVIDER_URL is NOT configured: the verifier class is
  #      compiled but the test itself is skipped (it's gated on
  #      pact.verifier.enabled=true). This keeps every PR honest about
  #      whether contract verification ran without blocking new repos
  #      that haven't wired up the tunnel yet.
  #
  # Choice rationale: a fresh in-CI Liberty needs WSO2 IS + Postgres +
  # Redis + Kafka because mpJwt + RolesAllowed + Flyway are all
  # production-shaped. Booting that stack inside a GitHub-hosted runner
  # would add 5+ minutes per PR for very little signal vs replaying
  # against the canonical staging container.
  # ---------------------------------------------------------------------------
  provider:
    name: pact provider verifier
    runs-on: ubuntu-latest
    needs: consumer
    steps:
      - uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile verifier (always)
        # `test-compile` keeps the pact-jvm wiring honest — a PR that breaks
        # the verifier class still fails CI, even when PACT_PROVIDER_URL
        # isn't configured. Surefire only runs the actual replay below.
        run: mvn -B -ntp test-compile

      - name: Run Pact-JVM verifier (live provider)
        if: vars.PACT_PROVIDER_URL != ''
        env:
          PACT_PROVIDER_URL: ${{ vars.PACT_PROVIDER_URL }}
          PACT_DB_URL: ${{ vars.PACT_DB_URL }}
          PACT_DB_USER: ${{ secrets.PACT_DB_USER }}
          PACT_DB_PASS: ${{ secrets.PACT_DB_PASS }}
        run: |
          mvn -B -ntp test -Dtest=LibertyProviderPactTest \
            -Dpact.verifier.enabled=true \
            -Dpact.provider.url="$PACT_PROVIDER_URL" \
            ${PACT_DB_URL:+-Dpact.db.url="$PACT_DB_URL"} \
            ${PACT_DB_USER:+-Dpact.db.user="$PACT_DB_USER"} \
            ${PACT_DB_PASS:+-Dpact.db.pass="$PACT_DB_PASS"}

      - name: Note that live verification was skipped
        if: vars.PACT_PROVIDER_URL == ''
        run: |
          echo "::warning::PACT_PROVIDER_URL variable not configured — live"
          echo "::warning::provider verification skipped. Verifier class still"
          echo "::warning::compiles; pacts/ files were diff-checked in Stage A."
          echo "::warning::To enable end-to-end replay, set the PACT_PROVIDER_URL"
          echo "::warning::repo variable to a Liberty URL the runner can reach."

      - name: Upload verifier reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pact-verifier-reports
          path: target/surefire-reports/
          if-no-files-found: warn
