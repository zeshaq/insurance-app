name: schemathesis
on:
  push:
  pull_request:
permissions:
  contents: read

# Phase 2 #12 - property-based fuzz of the OpenAPI spec.
#
# Approach: boot Liberty in this same workflow (cheap on a GHA runner), curl
# /openapi, run Schemathesis against the live endpoint. We do NOT reuse the
# `openapi-spec` artifact from the maven-tests workflow because Schemathesis
# needs a *running* target anyway - once Liberty is up, the spec it serves is
# the freshest possible source of truth. Downloading a sibling artifact would
# add a dependency between workflows that buys us nothing.
#
# Auth: the `@RolesAllowed("APPLICATION")` resources require a JWT. In CI we
# don't have WSO2 IS, so DevTokenResource (GET /api/auth/token) returns 502
# because it can't reach `wso2is:9763`. We work around that by minting a
# locally-signed JWT against a dev keystore (NOT shipped here - the
# `mint-ci-jwt` step is a placeholder that calls back to a script that needs
# to land alongside this workflow in a follow-up). Until then we fuzz
# unauthenticated; Schemathesis will hit 401 on most paths and that's fine -
# the hard-failure checks below (`not_a_server_error`,
# `response_schema_conformance`) still catch 5xx and schema-violating
# responses, which is the actual bug class we care about.

jobs:
  fuzz:
    name: Schemathesis fuzz against Liberty
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build WAR (skip tests)
        run: mvn -B -ntp -DskipTests=true -DskipITs=true package

      - name: Create + install + deploy Liberty
        run: mvn -B -ntp liberty:create liberty:install-feature liberty:deploy

      - name: Start Liberty
        run: mvn -B -ntp liberty:start

      - name: Wait for /openapi
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:9080/openapi || true)
            echo "attempt $i: HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 3
          done
          echo "::error::/openapi never returned 200"
          exit 1

      - name: Run Schemathesis (Docker, v4.x stable)
        # Checks chosen:
        #   - not_a_server_error          - any 5xx is a hard fail.
        #   - response_schema_conformance - response body must match the
        #     schema the spec says it returns. Catches mass-assignment /
        #     type-confusion / leaked-internal-field bugs.
        # Skipped:
        #   - status_code_conformance - too noisy: most operations are
        #     documented as returning 200 but `@RolesAllowed` endpoints
        #     actually return 401 without a JWT. Until a CI JWT mint is
        #     added (see header comment) this check would drown the signal.
        # Schemathesis 4 dropped --hypothesis-max-examples; --max-failures
        # bounds the run instead. `--phases fuzzing` skips the slower
        # `coverage` and `stateful` phases - bring those back in a nightly
        # workflow when the basic fuzz is green.
        # The empirical local run against today's Liberty surfaces 5 unique
        # 500s on POST /api/{quotes,policies,payments,claims} with malformed
        # JSON / null-byte bodies, plus GET /api/audit/contrast/{claimId}=0.
        # Those are real bugs and SHOULD fail this job until fixed.
        run: |
          docker run --rm --network host \
            -v "$PWD:/work" \
            -w /work \
            docker.io/schemathesis/schemathesis:stable run \
              --checks not_a_server_error,response_schema_conformance \
              --max-failures 25 \
              --phases fuzzing \
              --warnings off \
              --url http://localhost:9080 \
              --report junit \
              --report-junit-path schemathesis-junit.xml \
              http://localhost:9080/openapi?format=json \
              2>&1 | tee schemathesis.log

      - name: Stop Liberty
        if: always()
        run: mvn -B -ntp liberty:stop || true

      - name: Upload Schemathesis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schemathesis-report
          path: |
            schemathesis.log
            schemathesis-junit.xml
            schema-coverage.html
          if-no-files-found: warn

      - name: Upload Liberty logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: liberty-messages-fuzz
          path: target/liberty/wlp/usr/servers/defaultServer/logs/
          if-no-files-found: warn
