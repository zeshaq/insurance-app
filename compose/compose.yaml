# Infrastructure for the insurance-app teaching demo.
#
# Brings up data, messaging, observability, identity, gateway, and dev tools
# as podman containers on the existing `insurance-net` user-defined bridge.
# The insurance-app Liberty container and the WSO2 MI container are NOT in
# this file — they have their own build pipelines (../Containerfile and
# ../mi/Containerfile respectively) and the compose file is for the
# infrastructure layer they sit on top of.
#
# Usage:
#   podman-compose --profile data up -d              # postgres, redis, adminer
#   podman-compose --profile messaging up -d         # kafka + topics + UI + apicurio
#   podman-compose --profile storage up -d           # minio
#   podman-compose --profile mocks up -d             # wiremock, mailpit
#   podman-compose --profile search up -d            # opensearch + dashboards + debezium
#   podman-compose --profile identity up -d          # wso2is
#   podman-compose --profile gateway up -d           # wso2apim
#   podman-compose --profile all up -d               # everything
#
# SigNoz (observability) lives in its own upstream compose — see infra/signoz/README.md.

name: insurance-app-infra

networks:
  insurance-net:
    external: true

volumes:
  wso2is-data:
  postgres_data:
  kafka_data:
  minio_data:
  opensearch_data:
  redisinsight_data:

services:

  # ---------- Data layer ----------

  postgres:
    image: docker.io/library/postgres:17-alpine@sha256:d5daad18926b71c3d663f358af0aea798670cb79fb550c106d19662a9d1627ef
    container_name: postgres
    profiles: [data, all]
    environment:
      POSTGRES_USER: insurance
      POSTGRES_PASSWORD: insurance
      POSTGRES_DB: insurance
    command:
      - postgres
      - -c
      - wal_level=logical          # Debezium CDC (feature 9)
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [insurance-net]
    restart: unless-stopped

  redis:
    image: docker.io/library/redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: redis
    profiles: [data, all]
    command:
      - redis-server
      - --save
      - "60"
      - "1"
      - --appendonly
      - "no"
    ports: ["6379:6379"]
    networks: [insurance-net]
    restart: unless-stopped

  # All five admin UIs below are pinned to the image digest that was
  # known-working when the curriculum shipped (2026-05-15, smoke 144/0).
  # To bump: `podman pull <image>:latest && podman inspect ... --format '{{.Digest}}'`
  # then replace the @sha256:... after eyeballing the upstream changelog.
  adminer:
    image: docker.io/library/adminer@sha256:cc64d253db4f016cbcff2ff2f01e60ed07e74f38b4398f84d3c4fae4b5ce0e07
    container_name: adminer
    profiles: [data, all]
    ports: ["8090:8080"]
    networks: [insurance-net]
    restart: unless-stopped

  redisinsight:
    # Official Redis Inc. UI. Once it's up, add a database in the UI:
    # host=redis, port=6379, no auth.
    image: docker.io/redis/redisinsight@sha256:85562d67a9128ac7f764bb3d1ac909fcf77708c7c8f55bd1605a85b3c4becc83
    container_name: redisinsight
    profiles: [data, all]
    ports: ["5540:5540"]
    volumes:
      - redisinsight_data:/data
    networks: [insurance-net]
    restart: unless-stopped

  # ---------- Messaging ----------

  kafka:
    # Apache's official Kafka image (Bitnami's images vanished from docker.io in
    # the 2025 Broadcom reshuffle). Env vars use the plain KAFKA_* prefix —
    # no _CFG_, unlike Bitnami's convention.
    image: docker.io/apache/kafka:4.0.2@sha256:836cafdad9f4825880d7cf1d5a21202915ae2527bd0ef1c3600c526ed7814d1f
    container_name: kafka
    profiles: [messaging, all]
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
    ports: ["9092:9092"]
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks: [insurance-net]
    restart: unless-stopped

  kafka-init:
    # One-shot: waits for kafka, creates the topics from ADR 0005, exits.
    # Apache image puts kafka-topics.sh at /opt/kafka/bin/ (not on PATH).
    image: docker.io/apache/kafka:4.0.2@sha256:836cafdad9f4825880d7cf1d5a21202915ae2527bd0ef1c3600c526ed7814d1f
    container_name: kafka-init
    profiles: [messaging, all]
    depends_on: [kafka]
    networks: [insurance-net]
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "waiting for kafka..."
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1; do sleep 2; done
        echo "creating topics..."
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic quote-events            --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic policy-events           --partitions 3 --replication-factor 1 --config cleanup.policy=compact
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic claim-events            --partitions 3 --replication-factor 1 --config retention.ms=2592000000
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic payment-events          --partitions 3 --replication-factor 1 --config retention.ms=7776000000
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic notification-requested  --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic payment-dlq             --partitions 3 --replication-factor 1 --config retention.ms=2592000000
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic audit-events            --partitions 3 --replication-factor 1 --config cleanup.policy=compact
        echo "topics:"
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list

  kafka-ui:
    image: docker.io/provectuslabs/kafka-ui@sha256:8f2ff02d64b0a7a2b71b6b3b3148b85f66d00ec20ad40c30bdcd415d46d31818
    container_name: kafka-ui
    profiles: [messaging, all]
    depends_on: [kafka]
    environment:
      KAFKA_CLUSTERS_0_NAME: insurance
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://apicurio:8080/apis/ccompat/v7
    ports: ["8088:8080"]
    networks: [insurance-net]
    restart: unless-stopped

  apicurio:
    # Apache-licensed Avro/Protobuf schema registry; in-memory variant for the demo.
    image: docker.io/apicurio/apicurio-registry-mem:2.6.4.Final@sha256:4bdf99e1c48ca9e07ca6cf9eb0e01aa8f257fbee8f07d21b33a1eeaa5fec449f
    container_name: apicurio
    profiles: [messaging, all]
    ports: ["8081:8080"]
    networks: [insurance-net]
    restart: unless-stopped

  # ---------- Object storage ----------

  minio:
    image: docker.io/minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    container_name: minio
    profiles: [storage, all]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # console
    volumes:
      - minio_data:/data
    networks: [insurance-net]
    restart: unless-stopped

  # ---------- External mocks + SMTP sink ----------

  wiremock:
    # Stubs the MI outbound dependencies (credit bureau, payment, OCR).
    # Drop JSON mappings into infra/wiremock/mappings/ — auto-loaded.
    image: docker.io/wiremock/wiremock:3.10.0@sha256:052f7d05b585d5cc956ecf2f1543b1a721858ec83baf0d11b507a113e3b023ee
    container_name: wiremock
    profiles: [mocks, all]
    ports: ["8888:8080"]
    volumes:
      - ./infra/wiremock/mappings:/home/wiremock/mappings:Z
      - ./infra/wiremock/__files:/home/wiremock/__files:Z
    networks: [insurance-net]
    restart: unless-stopped

  mailpit:
    image: docker.io/axllent/mailpit@sha256:0059ef81e492a7192af3816281eed6859eb078bd7bdc58b76757c13e10e53a7d
    container_name: mailpit
    profiles: [mocks, all]
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # web UI
    networks: [insurance-net]
    restart: unless-stopped

  # ---------- Search + CDC (feature 9) ----------

  opensearch:
    image: docker.io/opensearchproject/opensearch:2.18.0@sha256:7f6fa1efee8f39e94ca30a0a31f95d866c8a99f25a86e6cf6691142d1eab4f9e
    container_name: opensearch
    profiles: [search, all]
    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 65536, hard: 65536 }
    networks: [insurance-net]
    restart: unless-stopped

  opensearch-dashboards:
    image: docker.io/opensearchproject/opensearch-dashboards:2.18.0@sha256:0ecd8444add2926cb6c52e03f910160138b6e331522237561da0b82e159b134f
    container_name: opensearch-dashboards
    profiles: [search, all]
    depends_on: [opensearch]
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports: ["5601:5601"]
    networks: [insurance-net]
    restart: unless-stopped

  debezium:
    # Kafka Connect distributed worker + Debezium connectors (postgres, mysql, …).
    image: docker.io/debezium/connect:2.7.3.Final@sha256:997b67feff614549acd20d54bfed398fc73b339881c649d42821c1e55ec9972b
    container_name: debezium
    profiles: [search, all]
    depends_on: [kafka]
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: insurance-connect
      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-status
    ports: ["8083:8083"]
    networks: [insurance-net]
    restart: unless-stopped

  # ---------- mTLS partner mock (slice 10) ----------

  partner-mock:
    # nginx-fronted stub that requires mTLS client cert verification.
    # Returns synthetic cross-carrier lookup data for /partner/lookup.
    # Certs come from compose/certs/ — run scripts/gen-certs.sh to generate.
    image: docker.io/library/nginx:alpine@sha256:feb6f75a08aa55b44576f98c15b8859819ecf54f3e4d2157f42c2d01cb58a3d2
    container_name: partner-mock
    profiles: [partner, all]
    volumes:
      - ./certs:/etc/nginx/certs:ro,Z
      - ./infra/partner/nginx.conf:/etc/nginx/nginx.conf:ro,Z
    networks: [insurance-net]
    restart: unless-stopped
    # Internal-only — Liberty calls partner-mock:8443 via the shared bridge.
    # No host port exposure: the demo certs are not for outside the VM.

  # ---------- Customer-facing GUI (slice 18) ----------

  customer-app:
    # SvelteKit + Auth.js — the customer portal that talks OIDC to WSO2 IS
    # and acts as a BFF in front of Liberty's /api/*. Built from
    # gui/customer-app/Containerfile, hand-built with `podman build` until
    # we add it to a real CI pipeline.
    image: localhost/customer-app:dev
    container_name: customer-app
    profiles: [gui, all]
    ports:
      - "3000:3000"
    environment:
      # AUTH_SECRET must be set externally for the cookie signing key — generate
      # once and keep stable (`openssl rand -base64 32`). Stored in
      # ~/insurance-app/.customer-app-oidc-creds alongside the OIDC creds.
      AUTH_SECRET: "${AUTH_SECRET}"
      AUTH_TRUST_HOST: "true"
      AUTH_URL: "https://my.insurance-app.comptech-lab.com"
      # OIDC client for the customer portal (separate from the service-account
      # client_credentials .wso2is-creds).
      CUSTOMER_OIDC_CLIENT_ID: "${CUSTOMER_OIDC_CLIENT_ID}"
      CUSTOMER_OIDC_CLIENT_SECRET: "${CUSTOMER_OIDC_CLIENT_SECRET}"
      # Service-account creds the BFF uses to call Liberty.
      WSO2IS_CLIENT_ID: "${WSO2IS_CLIENT_ID}"
      WSO2IS_CLIENT_SECRET: "${WSO2IS_CLIENT_SECRET}"
    networks: [insurance-net]
    restart: unless-stopped
    depends_on: [wso2is]

  # ---------- Identity + API gateway ----------

  wso2is:
    image: docker.io/wso2/wso2is:7.0.0@sha256:af4c39f20aac6a66bef0246086547ef3f7a80e4bd0711a57c306fcbf0278fbc5
    container_name: wso2is
    profiles: [identity, all]
    ports: ["9444:9443"]
    volumes:
      # Override deployment.toml so IS knows it sits behind the HAProxy at
      # is.insurance-app.comptech-lab.com on :443. Without this, every URL
      # IS hands back (console base, OIDC redirects, oauth2 endpoints, the
      # JWT iss claim) hardcodes https://localhost:9443 — fine inside the
      # container, broken from any browser outside the VM. Same pattern as
      # wso2apim below.
      - ./infra/wso2is/deployment.toml:/home/wso2carbon/wso2is-7.0.0/repository/conf/deployment.toml:ro,Z
      # Persist the H2 databases (DCR clients, registered users, OIDC
      # client configs) across container recreates. WITHOUT this volume,
      # podman-compose up --force-recreate wso2is wipes the DCR client +
      # the basicRegistry user that server.xml hardcodes — re-running the
      # Phase 6.5 dance every time. See build_gotchas item 19.
      - wso2is-data:/home/wso2carbon/wso2is-7.0.0/repository/database:Z
    networks: [insurance-net]
    restart: unless-stopped

  wso2apim:
    image: docker.io/wso2/wso2am:4.4.0@sha256:40fc82de795ad4e07f5e1791ab05a65106f18f4ef4451617c94ecfe93041b7ab
    container_name: wso2apim
    profiles: [gateway, all]
    ports:
      - "9446:9443"     # management consoles (publisher, devportal, admin)
      - "8243:8243"     # gateway HTTPS
      - "8280:8280"     # gateway HTTP
    volumes:
      # Override deployment.toml so APIM knows it sits behind a TLS-terminating
      # reverse proxy at apim.insurance-app.comptech-lab.com on :443. Without
      # this, redirects come back as https://localhost:9443/... and break.
      - ./infra/wso2apim/deployment.toml:/home/wso2carbon/wso2am-4.4.0/repository/conf/deployment.toml:ro,Z
    networks: [insurance-net]
    restart: unless-stopped
