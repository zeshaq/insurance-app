worker_processes  1;
events { worker_connections  1024; }

http {
    default_type application/json;
    log_format main '$remote_addr "$request" $status $body_bytes_sent client_cn="$ssl_client_s_dn"';
    access_log /var/log/nginx/access.log main;
    sendfile on;

    server {
        listen 8443 ssl;
        server_name partner-mock;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # mTLS: require + verify client cert against CA
        ssl_client_certificate /etc/nginx/certs/ca.crt;
        ssl_verify_client      on;
        ssl_verify_depth       2;

        # /partner/lookup?vin=X → static response. Real partner would
        # look up by VIN; for the demo every VIN matches.
        location = /partner/lookup {
            add_header X-Client-CN "$ssl_client_s_dn" always;
            return 200 '{"covers":true,"policyNumber":"P-12345-RIVAL","carrier":"RivalInsurance","verifiedAt":"$time_iso8601"}';
        }

        location = /partner/health {
            return 200 '{"status":"ok"}';
        }

        location / {
            return 404 '{"error":"unknown partner endpoint"}';
        }
    }
}
