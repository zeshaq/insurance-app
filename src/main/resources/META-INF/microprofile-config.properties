# MicroProfile Config — Kafka channels for the `quote-events` topic.
#
# Liberty's mpReactiveMessaging-3.0 feature provides the `liberty-kafka`
# connector. The outgoing channel binds the @Channel("quote-events") emitter
# to the broker; the incoming channel powers QuoteEventConsumer.

# --- Producer: emits when a quote is created ---
mp.messaging.outgoing.quote-events.connector=liberty-kafka
mp.messaging.outgoing.quote-events.topic=quote-events
mp.messaging.outgoing.quote-events.bootstrap.servers=kafka:9092
mp.messaging.outgoing.quote-events.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.quote-events.key.serializer=org.apache.kafka.common.serialization.StringSerializer



# --- Outbound rest client to the credit bureau (via MI). ---
# CreditBureauClient is @RegisterRestClient(configKey="credit-bureau"). MI sits
# at insurance-mi:8290 on the shared podman bridge and proxies /credit/check
# to WireMock; in production this would point at the real bureau via MI.
credit-bureau/mp-rest/url=http://insurance-mi:8290/credit
credit-bureau/mp-rest/connectTimeout=3000
credit-bureau/mp-rest/readTimeout=5000
payment-gateway/mp-rest/url=http://insurance-mi:8290/payment
payment-gateway/mp-rest/connectTimeout=3000
payment-gateway/mp-rest/readTimeout=5000
notification-mi/mp-rest/url=http://insurance-mi:8290/notification
notification-mi/mp-rest/connectTimeout=3000
notification-mi/mp-rest/readTimeout=5000
ocr-mi/mp-rest/url=http://insurance-mi:8290/ocr
ocr-mi/mp-rest/connectTimeout=3000
ocr-mi/mp-rest/readTimeout=10000
partner/mp-rest/url=https://partner-mock:8443/partner
partner/mp-rest/connectTimeout=3000
partner/mp-rest/readTimeout=5000




# --- mpJwt: explicit MicroProfile Config keys for portability. ---
# server.xml <mpJwt> sets the runtime config, but the @LoginConfig + these
# keys together ensure Liberty fully wires the mpJwt auth method instead of
# falling back to Basic.
mp.jwt.verify.publickey.location=http://wso2is:9763/oauth2/jwks
mp.jwt.verify.issuer=https://localhost:9443/oauth2/token
mp.jwt.token.header=Authorization
